bank_info:
    title: Motion w Constant Acceleration along 1D
    bank_id: PHY1-1DM-UAM1-09182025 
    description: |-
      Problem set for 1 segment of UAM along 1D.
    date_created: 09-18-2025 # Today's date    
    status: ready # Only use 'draft', 'ready', 'deployed', and 'deprecated' for this field.
    learning objectives:
        - 1DM-KE-1
    generation prompts: # The following are the prompts that generated the questions in the problem bank.
        - prompt 1: |
            I want to write an isomorphic problem-set for my students about motion with constant acceleration on a straight-line segment. 
            There are five relevant kinematic variables (displacement, instantaneous initial velocity, instantaneous final velocity, constant acceleration, and time interval) associated with each such segment. These physical quantities are related to each other via the kinematic equations. In a typical problem, three of the five variables are given either explicitly or implicitly, and the kinematic equations are used to find the other two. 
            Now, generate 5 "real-life" instances of objects in motion with constant acceleration along a straight segment that can be used in this problem set. Do not write full problems yet--just state the objects and a brief description of their motion.
        - prompt 2: |  ## Prompt 2
            For each of the instances, identify one or two kinematic variables that are central to the story -- either because the variable is naturally implied by the description or can be directly measured by an observer (note that acceleration is not something that is known or can be measured directly unless the object is in free fall.) Identify the implicit value or otherwise ascribe a realistic value. Make a table.
        - prompt 3: | ## Prompt 3
            For each instance, come up with two sets of kinematic variables that a) include the variables in the table above, b) are somewhat realistic, and c) satisfy the kinematic equations. Make a table.
        - prompt 4: |  ## Prompt 4
            Before we turn each set into a word problem, make a version of this table where the two central variables plus one other variable are given (implicitly or explicitly), and pick one of the last two variables as the one to solve for.
        - prompt 5: |  ## Prompt 5
            For the ball thrown upwards: set 1 provide vf implicitly at max height, and ask for t; for set 2, provide vf implicitly at max height and ask for displacement.
        - prompt 6: |  ## Prompt 6
            Turn each set into a word problem with rich context. Provide the given variables (implicitly or explicitly) and ask about the variable to solve for. Make the instructions in regular language and try to use keywords to communicate the variables as opposed to explicitly naming them by the physics jargon (like initial velocity and final velocity.) Do not separate the question from the problem head.
        - prompt 7: | ## Prompt 7
            For the first problem, write a solution in the following format:
            1. Acknowledge that the physics involved is about motion with constant acceleration along a straight segment, and thus the kinematic equations can be used. Make a brief statement about what's given and what variable is to be found. If the question is about a physical quantity that is the magnitude of another physical quantity, amke that explicit.
            2. Make a table of the kinematic variables: displacement, initial instantaneous velocity, final instantaneous velocity, acceleration, and time interval. For each variable indicate whether it is implicitly or explicitly given or put a question mark if it is to be solved for.
            3. Next identify the kinematic equation to be used based on the knowns and unknowns. 
            4. Start from the common form of the kinematic equation and algebraically manipulate the equation to find the variable to be solved for. 
            5. Substitute for the variables with their numerical; values and units and solve.
        - prompt 8: | ## Prompt 8
            beautiful. do the same for all sets. take your time.
        - prompt 9: |  ## Prompt 9
            for the ball thrown vertically upward, set 1: make initial speed 6.0 m/s and for set 2, make it 8.0 m/s
        - prompt 10: |  ## Prompt 10
            output all my prompts in  a markdown file
    LLM: chatGPT-5
    authors: O. Moussa
    updates:
      - update 1: 
        - description: Chen instructed Gemini Pro to update the original markdown table into html tables, and it seems to have worked.
        - prompt 1: For the question in this yaml, the general feedback part contains a table. does this look like a latex table?
        - prompt 2: Can you change the markdown tables into html tables?
questions:
- numerical: # The problem type is a numerical input problem. do not change.
    id: q01 #generate an id 
    title: Everyday Moment 01 #generate a title that does not give away any part of the physics
    points: 1 #keep it 1 for now
    text: |
        A cyclist pushes off from a red light and steadily picks up speed on a straight road. After 4.0 seconds, the cyclist’s speedometer shows about 6.0 m/s. Assuming the bike started from rest, how strong was the steady pickup of speed during this interval?
    answer:
        value: 1.5 # The numerical answer to the problem. ONLY the number, with no units or mark down.
        margin_type: percent #the allowed variance is the tolerance percent of the value.
        tolerance: 5 # The tolerance. 
    feedback:
        general: |
            1) Physics & task
               Straight-line motion with constant acceleration, so the kinematic equations apply. From the story: starts from rest, reaches 6.0 m/s in 4.0 s. We seek the acceleration (magnitude along the motion).
            
            2) Kinematic table
               <table>
                 <thead>
                   <tr>
                     <th>Quantity</th>
                     <th>Symbol</th>
                     <th>Value</th>
                     <th>Given?</th>
                   </tr>
                 </thead>
                 <tbody>
                   <tr>
                     <td>Displacement</td>
                     <td>Δx</td>
                     <td>—</td>
                     <td>not needed</td>
                   </tr>
                   <tr>
                     <td>Initial speed</td>
                     <td>vi</td>
                     <td>0.0 m/s</td>
                     <td>Implicit (“starts from rest”)</td>
                   </tr>
                   <tr>
                     <td>Final speed</td>
                     <td>vf</td>
                     <td>6.0 m/s</td>
                     <td>Explicit</td>
                   </tr>
                   <tr>
                     <td>Acceleration</td>
                     <td>a</td>
                     <td>?</td>
                     <td>Solve for</td>
                   </tr>
                   <tr>
                     <td>Time interval</td>
                     <td>t</td>
                     <td>4.0 s</td>
                     <td>Explicit</td>
                   </tr>
                 </tbody>
               </table>
            
            3) Equation choice
               Use <latex>v_f = v_i + a t</latex>.
            
            4) Algebra
               <latex>a = \dfrac{v_f - v_i}{t}</latex>.
            
            5) Numbers & units
               <latex>a = \dfrac{6.0 - 0.0}{4.0}\ \text{m/s}^2 = 1.5\ \text{m/s}^2</latex>.
            
            Answer: <latex>1.5\ \text{m/s}^2</latex>.
        on_correct: Good job! #do not change
        on_incorrect: Try again! #do not change
- numerical: # The problem type is a numerical input problem. do not change.
    id: q02 #generate an id 
    title: Everyday Moment 02 #generate a title that does not give away any part of the physics
    points: 1 #keep it 1 for now
    text: |
        A cyclist starts pedaling hard from a stop and covers about 18 meters before coasting. At that point the speedometer shows 6.0 m/s. How long did it take the rider to reach that speed?
    answer:
        value: 6.0 # The numerical answer to the problem. ONLY the number, with no units or mark down.
        margin_type: percent #the allowed variance is the tolerance percent of the value.
        tolerance: 5 # The tolerance. 
    feedback:
        general: |
            1) Physics & task
               Constant-acceleration motion. The rider starts from rest, covers 18 m, and is moving 6.0 m/s at that point. Find the time to reach that speed.
            
            2) Kinematic table
               <table>
                 <thead>
                   <tr>
                     <th>Quantity</th>
                     <th>Symbol</th>
                     <th>Value</th>
                     <th>Given?</th>
                   </tr>
                 </thead>
                 <tbody>
                   <tr>
                     <td>Displacement</td>
                     <td>Δx</td>
                     <td>18.0 m</td>
                     <td>Explicit</td>
                   </tr>
                   <tr>
                     <td>Initial speed</td>
                     <td>vi</td>
                     <td>0.0 m/s</td>
                     <td>Implicit</td>
                   </tr>
                   <tr>
                     <td>Final speed</td>
                     <td>vf</td>
                     <td>6.0 m/s</td>
                     <td>Explicit</td>
                   </tr>
                   <tr>
                     <td>Acceleration</td>
                     <td>a</td>
                     <td>—</td>
                     <td>not needed</td>
                   </tr>
                   <tr>
                     <td>Time interval</td>
                     <td>t</td>
                     <td>?</td>
                     <td>Solve for</td>
                   </tr>
                 </tbody>
               </table>
            
            3) Equation choice
               Average-speed form (valid for constant acceleration): <latex>\Delta x = \dfrac{v_i + v_f}{2}\,t</latex>.
            
            4) Algebra
               <latex>t = \dfrac{2\,\Delta x}{v_i + v_f}</latex>.
            
            5) Numbers & units
               <latex>t = \dfrac{2(18.0)}{0.0 + 6.0}\,\text{s} = \dfrac{36.0}{6.0}\,\text{s} = 6.0\,\text{s}</latex>.
            
            Answer: <latex>6.0\ \text{s}</latex>.
        on_correct: Good job! #do not change
        on_incorrect: Try again! #do not change
- numerical: # The problem type is a numerical input problem. do not change.
    id: q03 #generate an id 
    title: Everyday Moment 03 #generate a title that does not give away any part of the physics
    points: 1 #keep it 1 for now
    text: |
        A car is cruising down a highway at about 27 m/s (roughly 60 mph). The driver brakes steadily and comes to a full stop in 4.5 seconds. What was the steady slowdown rate during braking?
    answer:
        value: 6.0 # The numerical answer to the problem. ONLY the number, with no units or mark down.
        margin_type: percent #the allowed variance is the tolerance percent of the value.
        tolerance: 5 # The tolerance. 
    feedback:
        general: |
            1) Physics & task
               Constant-acceleration (uniform slowdown). The car goes 27.0 m/s, stops in 4.5 s. Find the magnitude of the steady slowdown (acceleration opposite motion).
            
            2) Kinematic table
               <table>
                 <thead>
                   <tr>
                     <th>Quantity</th>
                     <th>Symbol</th>
                     <th>Value</th>
                     <th>Given?</th>
                   </tr>
                 </thead>
                 <tbody>
                   <tr>
                     <td>Displacement</td>
                     <td>Δx</td>
                     <td>—</td>
                     <td>not needed</td>
                   </tr>
                   <tr>
                     <td>Initial speed</td>
                     <td>vi</td>
                     <td>27.0 m/s</td>
                     <td>Explicit</td>
                   </tr>
                   <tr>
                     <td>Final speed</td>
                     <td>vf</td>
                     <td>0.0 m/s</td>
                     <td>Implicit (stops)</td>
                   </tr>
                   <tr>
                     <td>Acceleration</td>
                     <td>a</td>
                     <td>?</td>
                     <td>Solve for</td>
                   </tr>
                   <tr>
                     <td>Time interval</td>
                     <td>t</td>
                     <td>4.5 s</td>
                     <td>Explicit</td>
                   </tr>
                 </tbody>
               </table>
            
            3) Equation choice
               <latex>v_f = v_i + a t</latex>.
            
            4) Algebra
               <latex>a = \dfrac{v_f - v_i}{t}</latex>.
            
            5) Numbers & units
               <latex>a = \dfrac{0.0 - 27.0}{4.5}\,\text{m/s}^2 = -6.0\,\text{m/s}^2</latex>. Magnitude: <latex>6.0\,\text{m/s}^2</latex>.
            
            Answer: <latex>6.0\ \text{m/s}^2</latex> (magnitude).
        on_correct: Good job! #do not change
        on_incorrect: Try again! #do not change
