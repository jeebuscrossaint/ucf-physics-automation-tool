                   <tr>
                     <td>Initial speed</td>
                     <td>vi</td>
                     <td>8.0 m/s (up)</td>
                     <td>Explicit</td>
                   </tr>
                   <tr>
                     <td>Final speed</td>
                     <td>vf</td>
                     <td>0.0 m/s</td>
                     <td>Implicit</td>
                   </tr>
                   <tr>
                     <td>Acceleration</td>
                     <td>a</td>
                     <td>-9.8 m/s^2</td>
                     <td>Explicit</td>
                   </tr>
                   <tr>
                     <td>Time interval</td>
                     <td>t</td>
                     <td>—</td>
                     <td>not needed</td>
                   </tr>
                 </tbody>
               </table>
            
            3) Equation choice
               <latex>v_f^2 = v_i^2 + 2 a \Delta x</latex>.
            
            4) Algebra
               <latex>\Delta x = \dfrac{v_f^2 - v_i^2}{2a}</latex>.
            
            5) Numbers & units
               <latex>\Delta x = \dfrac{0.0^2 - (8.0)^2}{2(-9.8)} = \dfrac{-64}{-19.6} \approx 3.27\,\text{m}</latex>.
            
            Answer: <latex>3.27\ \text{m}</latex>.
        on_correct: Good job! #do not change
        on_incorrect: Try again! #do not change
