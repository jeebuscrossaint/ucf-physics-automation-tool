bank_info:
    title: What is conserved for multi-stage process categorization problem
    bank_id: PHY1-CLM-WICMSCAT-110225 #Subject-Unit-Abbreviation_of_title_or_any_string-date
    description: |-
        The description will be generated after all the problems are being created.
    date created: 11-02-2025 # Today's date 
    status: draft # Only use 'draft', 'ready', 'deployed', and 'deprecated' for this field.
    learning objectives:
    generation prompts: # Those prompts creates the 8 problems for the perfectly inelastic collision condition. Modify those prompt to create two mor sets of 8 problems for explosion/launch forward situation, and collide and bounce condition.
        - prompt 1: |
            I am writing introductory level physics problems about conservation of linear momentum and mechanical energy. Please come up with four situations, each consisting of two objects and three consecutive stages. For the first two situations, in the first stage, both mechanical energy and linear momentum of the system is conserved. In the second stage there is a perfectly inelastic collision between the two objects. In the third stage,  mechanical energy of the system is conserved since conservative force does work on the system, but linear momentum is not (alternate between gravity and elastic force for the conservative forces). For example, an inelastic ballistic pendulum in which a bullet is embedded into the pendulum is a good example.
            For the next two situations, stages 1 and 3 are reversed. For example, a block slides down a curved track and hits and sticks to a second block.
            List each of the situations and the three stages under the situation.
        - prompt 2: | 
            Now write the first situation into a categorization problem. The problem asks students to decide whether mechanical energy or linear momentum is conserved during a collision process. 
            Follow the instructions below:
            Write a problem description describing the entire process including all three stages, but do not explicitly state the stages. 
            Ask students to decide if mechanical energy and linear momentum of the system is conserved during each of the following processes, by dragging the conservation statements on to the corresponding process descriptions.
            Write five description of processes. Each description takes the form of "from....to...". For example: From when cart A and B are far apart to just before the two carts collide with each other. From just before the carts collide with each other to just before both carts hit the spring bumper.
            The first three descriptions correspond to the three stages in the situation. The last two descriptions are distractors, so neither quantity is conserved. One of them should be the entire process from start to end. The other should include both the collision phase and energy conservation phase.
            Finally, associate the following three conservation statements to the first three process descriptions: 
            Linear momentum is conserved but not Mechanical Energy
            Mechanical Energy is conserved but not Linear Momentum
            Both Linear Momentum and Mechanical Energy are conserved
        - prompt 2.1: |
            Make one small change: in 5., don't use "instant of collision", instead use "From just before Cart A hits Cart B".
        - prompt 3: |
            Following the same structure, generate the full content for situations 2-4
        - prompts 3.1: | # multiple small modification prompts.
            Make the following changes: For situation 2, change the situation into an ice-hockey puck hitting something on ice (such as an ice hockey glove or helmet) and sticking to it. For situation 3, don't use stretched spring, use compressed spring. In the first description, state when the block is released and being accelerated by the spring.
            For situation 3, update descriptions 4 and 5 according to description 1.
        - prompt 4: | # for record keeping purpose
            Now add all four complete problem texts into a downloadable markdown file.
            Add this sentence at the end of each problem description: "If neither linear momentum nor mechanical energy is conserved, do not drag any statement onto the process description".
        - prompt 5: | # yaml formatting example omitted, see formatting template.
            For each of the four problems in the markdown file, translate the format into yaml according to the following example:

            The categories should be the process descriptions, and the answers should be the conservation statements. For distractor processes, leave an empty answers field "answers:"
        - prompt 6: |
            Based on those four problems, generate four new problems by changing the problem text such as the process involving conservative forces doing work happens on rough surface or resistive medium. (the collision and sliding process still happens on smooth surface).  Write the four problem texts first.
        - prompt 6.1: |
            Make the following changes: Do not explicitly mention how friction or resistive force does work in each situation, only mention that the surface is rough. In situations 3 and 4, the initial stage should happen on rough surface, whereas the second process should happen on smooth surface.
        - prompt 7: |
            Yes, please convert those into yaml file with the following requirements:
            1. label the question q5 - q8
            2. The process that happens on rough surface now has an empty "answers:" field
            3. The "mechanical energy is conserved by not linear momentum" now becomes a distractor under the "distractors:" field
    updates: 
        - update 1: 
    associated data:
        - random number generation script: "./PHY1-F-OFKF-030625-script.py" # This can be any tables or files created as part of the process.
    generation details: # Details of the creation process
            model: GPT-5 # The model used to generate the questions
            version: ChatGPT # The version of the model used
            last updated: 11-02-2025 # The date of the last update of the generation prompts.
    authors:
        - Zhongzhou Chen

questions:
# The following contents should be replaced by the output of the LLM.

- categorization:
    id: q1
    title: Carts on a Track and a Spring Bumper
    points: 100
    text: |
      Two carts, A and B, move on a smooth, horizontal, frictionless track. Cart A is moving toward cart B, which is initially at rest. 
      A fixed spring bumper is mounted at the far end of the track. Cart A collides with cart B, and the two carts stick together 
      and continue moving toward the spring bumper. Afterward, the joined carts compress the spring until they momentarily come 
      to rest before reversing direction.

      For each of the following process descriptions, determine whether mechanical energy and/or linear momentum of the two-cart system 
      is conserved. Drag each conservation statement onto the corresponding process description.  
      If neither linear momentum nor mechanical energy is conserved, do not drag any statement onto the process description.

    categories:
    - category:
        description: From when carts A and B are far apart to just before the two carts collide with each other.
        answers:
        - Both Linear Momentum and Mechanical Energy are conserved
    - category:
        description: From just before the carts collide with each other to just after they stick together.
        answers:
        - Linear Momentum is conserved but not Mechanical Energy
    - category:
        description: From just after the two carts stick together to the moment the joined carts are momentarily at rest while compressing the spring.
        answers:
        - Mechanical Energy is conserved but not Linear Momentum
    - category:
        description: From when cart A begins moving toward cart B until the joined carts come to rest against the spring bumper.
        answers:
    - category:
        description: From just before cart A hits cart B until the spring is fully compressed.
        answers:

- categorization:
    id: q2
    title: Hockey Puck–Helmet on Ice, Then a Ramp
    points: 100
    text: |
      On a smooth, frictionless ice rink, a hockey puck slides toward a helmet that is initially at rest. 
      A smooth, frictionless ramp stands nearby. The puck collides with the helmet, and they stick together. 
      The combined puck+helmet then move up the ramp, slowing down as gravitational potential energy increases, 
      until they momentarily come to rest before sliding back down.

      For each of the following process descriptions, determine whether mechanical energy and/or linear momentum of the two-object system 
      (puck + helmet) is conserved. Drag each conservation statement onto the corresponding process description.  
      If neither linear momentum nor mechanical energy is conserved, do not drag any statement onto the process description.

    categories:
    - category:
        description: From when the puck and helmet are far apart on the ice to just before they collide with each other.
        answers:
        - Both Linear Momentum and Mechanical Energy are conserved
    - category:
        description: From just before the puck hits the helmet to just after they stick together.
        answers:
        - Linear Momentum is conserved but not Mechanical Energy
    - category:
        description: From just after the puck and helmet stick together to the moment the combined object is momentarily at rest at the top of the ramp.
        answers:
        - Mechanical Energy is conserved but not Linear Momentum
    - category:
        description: From when the puck begins sliding toward the helmet until the combined object is momentarily at rest at the top of the ramp.
        answers:
    - category:
        description: From just before the puck hits the helmet until the combined object is momentarily at rest at the top of the ramp.
        answers:

- categorization:
    id: q3
    title: Compressed Spring Launch and Collision
    points: 100
    text: |
      Block A rests against a compressed spring anchored to a wall on a frictionless horizontal track. 
      The spring is released, and Block A is accelerated by the spring as it moves toward Block B, which is initially at rest farther down the track. 
      After leaving the spring, Block A collides with Block B, and the two blocks stick together. 
      The joined blocks then coast freely on the frictionless track, far from the wall and spring.

      For each of the following process descriptions, determine whether mechanical energy and/or linear momentum of the two-block system 
      (A + B) is conserved. Drag each conservation statement onto the corresponding process description.  
      If neither linear momentum nor mechanical energy is conserved, do not drag any statement onto the process description.

    categories:
    - category:
        description: From when Block A is released and being accelerated by the compressed spring to just before it hits Block B.
        answers:
        - Mechanical Energy is conserved but not Linear Momentum
    - category:
        description: From just before Block A hits Block B to just after the two blocks stick together.
        answers:
        - Linear Momentum is conserved but not Mechanical Energy
    - category:
        description: From just after the two blocks stick together to a moment later while they are coasting far from the wall and spring on the frictionless track.
        answers:
        - Both Linear Momentum and Mechanical Energy are conserved
    - category:
        description: From when Block A is released and being accelerated by the compressed spring until the joined blocks are coasting far from the wall and spring.
        answers:
    - category:
        description: From when Block A is released and being accelerated by the compressed spring to just after Blocks A and B stick together.
        answers:

- categorization:
    id: q4
    title: Sled Descends, Sticks, and Glides
    points: 100
    text: |
      Sled A starts from rest at the top of a smooth, frictionless hill and slides down toward Sled B, which waits at the bottom on level, frictionless ice. 
      Sled A collides with Sled B, and they stick together. The joined sleds then glide across the flat ice with no additional horizontal forces acting.

      For each of the following process descriptions, determine whether mechanical energy and/or linear momentum of the two-sled system 
      (A + B) is conserved. Drag each conservation statement onto the corresponding process description.  
      If neither linear momentum nor mechanical energy is conserved, do not drag any statement onto the process description.

    categories:
    - category:
        description: From when Sled A begins descending the hill to just before it collides with Sled B at the bottom.
        answers:
        - Mechanical Energy is conserved but not Linear Momentum
    - category:
        description: From just before Sled A hits Sled B to just after the two sleds stick together.
        answers:
        - Linear Momentum is conserved but not Mechanical Energy
    - category:
        description: From just after the two sleds stick together to a moment later while they glide across the level, frictionless ice.
        answers:
        - Both Linear Momentum and Mechanical Energy are conserved
    - category:
        description: From when Sled A begins descending the hill until the joined sleds are gliding together across the level ice.
        answers:
    - category:
        description: From when Sled A begins descending the hill to just after the two sleds stick together.
        answers:

- categorization:
    id: q5
    title: Carts on a Track with a Rough Patch and Spring Bumper
    points: 100
    text: |
      Two carts, A and B, move on a smooth, horizontal, frictionless track. Cart A is moving toward cart B, which is initially at rest. 
      A rough patch lies just before a fixed spring bumper at the far end of the track. Cart A collides with cart B, and the two carts stick together, 
      continuing toward the spring bumper. As the joined carts travel over the rough patch, the motion takes place on a non-smooth surface 
      until they momentarily come to rest before reversing direction.

      For each of the following process descriptions, determine whether mechanical energy and/or linear momentum of the two-cart system is conserved.  
      Drag each conservation statement onto the corresponding process description.  
      If neither linear momentum nor mechanical energy is conserved, do not drag any statement onto the process description.

    categories:
    - category:
        description: From when carts A and B are far apart to just before the two carts collide with each other.
        answers:
        - Both Linear Momentum and Mechanical Energy are conserved
    - category:
        description: From just before the carts collide with each other to just after they stick together.
        answers:
        - Linear Momentum is conserved but not Mechanical Energy
    - category:
        description: From just after the two carts stick together to the moment the joined carts come to rest on the rough patch.
        answers:
    - category:
        description: From when cart A begins moving toward cart B until the joined carts come to rest against the spring bumper.
        answers:
    - category:
        description: From just before cart A hits cart B until the joined carts come to rest on the rough patch.
        answers:

    distractors:
    - Mechanical Energy is conserved but not Linear Momentum

